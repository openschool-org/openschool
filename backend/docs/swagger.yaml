        type: string
      grade_id:
        type: string
      id:
        type: string
      name:
        type: string
      stream_group_id:
        type: string
      stream_id:
        type: string
    type: object
  models.ClassWithDetailsResponse:
    properties:
      academic_year_id:
        type: string
      academic_year_label:
        type: string
      created_at:
        type: string
      form_teacher_id:
        type: string
      grade_id:
        type: string
      grade_name:
        type: string
      id:
        type: string
      name:
        type: string
      stream_group_id:
        type: string
      stream_id:
        type: string
    type: object
  models.CreateAcademicYearRequest:
    properties:
      end_date:
        type: string
      is_current:
        type: boolean
      label:
        type: string
      start_date:
        type: string
