  models.CreateClassRequest:
    properties:
      academic_year_id:
        type: string
      form_teacher_id:
        type: string
      grade_id:
        type: string
      name:
        type: string
      stream_group_id:
        type: string
      stream_id:
        type: string
    required:
    - academic_year_id
    - grade_id
    - name
    type: object
  models.CreateGradeRequest:
    properties:
      name:
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  models.CreateSchoolRequest:
    properties:
      address:
        type: string
      email:
        type: string
      logo_url:
        type: string
      name:
        type: string
      phone:
        type: string
    required:
    - name
