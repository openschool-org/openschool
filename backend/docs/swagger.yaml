  models.CreateStreamGroupRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  models.CreateStreamRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  models.CreateSubjectRequest:
    properties:
      code:
        type: string
      name:
        type: string
    required:
    - code
    - name
    type: object
  models.CreateTeacherRequest:
    properties:
      email:
        description: ThunderID fields
        type: string
      employee_number:
        description: Teacher profile fields
        type: string
      family_name:
        type: string
      given_name:
        type: string
      joined_date:
        type: string
      password:
        type: string
      phone_number:
        type: string
