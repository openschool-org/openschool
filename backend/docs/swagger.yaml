host: localhost:8080
info:
  contact: {}
  description: Digital Infrastructure for Sri Lankan Schools
  title: OpenSchool API
  version: "1.0"
paths:
  /academic-years:
    get:
      description: Retrieve all academic years ordered by start date
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AcademicYearResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List academic years
      tags:
      - academic-years
    post:
      consumes:
      - application/json
      description: Create a new academic year
      parameters:
      - description: Academic year info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAcademicYearRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AcademicYearResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create academic year
      tags:
      - academic-years
  /academic-years/{academic_year_id}/classes:
    get:
      description: Get all classes for a specific academic year
      parameters:
      - description: Academic Year ID
        in: path
        name: academic_year_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ClassWithDetailsResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List classes by academic year
      tags:
      - classes
  /academic-years/{id}:
    delete:
      description: Delete an academic year by ID
      parameters:
      - description: Academic year UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete academic year
      tags:
      - academic-years
  /academic-years/{id}/set-current:
    put:
      description: Mark an academic year as the current one; clears the previous current
      parameters:
      - description: Academic year UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set current academic year
      tags:
      - academic-years
  /academic-years/current:
    get:
      description: Retrieve the academic year marked as current
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AcademicYearResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current academic year
      tags:
      - academic-years
  /attendance/sessions:
    post:
      consumes:
      - application/json
      description: Create a new attendance session for a class on a specific date
      parameters:
      - description: Session details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAttendanceSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AttendanceSessionResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create attendance session
      tags:
      - attendance
  /attendance/sessions/{id}:
    get:
      description: Get an attendance session by ID
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AttendanceSessionResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get attendance session
      tags:
      - attendance
  /attendance/sessions/{id}/records:
    get:
      description: Get all attendance records for a session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AttendanceRecordResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List attendance by session
      tags:
      - attendance
    post:
      consumes:
      - application/json
      description: Mark attendance for all students in a session
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Attendance records
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.MarkAttendanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark attendance
      tags:
      - attendance
  /classes:
    post:
      consumes:
      - application/json
      description: Create a new class for a grade and academic year
      parameters:
      - description: Class details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateClassRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create class
      tags:
      - classes
  /classes/{id}:
    delete:
      description: Delete a class if no students are enrolled
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete class
      tags:
      - classes
    get:
      description: Get a single class by its ID
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get class by ID
      tags:
      - classes
    put:
      consumes:
      - application/json
      description: Update class name or form teacher
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Class details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateClassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update class
      tags:
      - classes
  /classes/{id}/attendance/sessions:
    get:
      description: Get all attendance sessions for a specific class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AttendanceSessionResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List attendance sessions by class
      tags:
      - attendance
  /classes/{id}/form-teacher:
    put:
      consumes:
      - application/json
      description: Assign a form teacher to a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Teacher details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AssignFormTeacherRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Assign form teacher
      tags:
      - classes
  /classes/{id}/students:
    get:
      description: Get all students enrolled in a specific class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StudentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List students by class
      tags:
      - students
  /classes/{id}/students/{student_id}/enroll:
    post:
      description: Enroll a student into a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Enroll student in class
      tags:
      - classes
  /classes/{id}/students/{student_id}/unenroll:
    delete:
      description: Remove a student from a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Unenroll student from class
      tags:
      - classes
  /classes/{id}/subject-teachers:
    get:
      description: Get all subject teachers assigned to a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SubjectTeacherResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
