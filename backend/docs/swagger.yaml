host: localhost:8080
info:
  contact: {}
  description: Digital Infrastructure for Sri Lankan Schools
  title: OpenSchool API
  version: "1.0"
paths:
  /academic-years:
    get:
      description: Retrieve all academic years ordered by start date
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AcademicYearResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List academic years
      tags:
      - academic-years
    post:
      consumes:
      - application/json
      description: Create a new academic year
      parameters:
      - description: Academic year info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateAcademicYearRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AcademicYearResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create academic year
      tags:
      - academic-years
  /academic-years/{academic_year_id}/classes:
    get:
      description: Get all classes for a specific academic year
      parameters:
      - description: Academic Year ID
        in: path
        name: academic_year_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ClassWithDetailsResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List classes by academic year
      tags:
      - classes
  /academic-years/{id}:
    delete:
      description: Delete an academic year by ID
      parameters:
      - description: Academic year UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete academic year
      tags:
      - academic-years
  /academic-years/{id}/set-current:
    put:
      description: Mark an academic year as the current one; clears the previous current
      parameters:
      - description: Academic year UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set current academic year
      tags:
      - academic-years
  /academic-years/current:
    get:
      description: Retrieve the academic year marked as current
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AcademicYearResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current academic year
      tags:
      - academic-years
  /classes:
    post:
      consumes:
      - application/json
      description: Create a new class for a grade and academic year
      parameters:
      - description: Class details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateClassRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create class
      tags:
      - classes
  /classes/{id}:
    delete:
      description: Delete a class if no students are enrolled
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete class
      tags:
      - classes
    get:
      description: Get a single class by its ID
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get class by ID
      tags:
      - classes
    put:
      consumes:
      - application/json
      description: Update class name or form teacher
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Class details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateClassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update class
      tags:
      - classes
  /classes/{id}/form-teacher:
    put:
      consumes:
      - application/json
      description: Assign a form teacher to a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Teacher details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AssignFormTeacherRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ClassResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Assign form teacher
      tags:
      - classes
  /classes/{id}/students:
    get:
      description: Get all students enrolled in a specific class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StudentResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List students by class
      tags:
      - students
  /classes/{id}/subject-teachers:
    get:
      description: Get all subject teachers assigned to a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SubjectTeacherResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List subject teachers
      tags:
      - classes
    post:
      consumes:
      - application/json
      description: Assign a teacher to teach a subject in a class
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      - description: Subject teacher details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AssignSubjectTeacherRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Assign subject teacher
      tags:
      - classes
  /classes/current:
    get:
      description: Get all classes for the current academic year
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ClassWithDetailsResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List current classes
      tags:
      - classes
  /grades:
    get:
      description: Retrieve all grades ordered by sort_order then name
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.GradeResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List grades
      tags:
      - grades
    post:
      consumes:
      - application/json
      description: Create a new grade level
      parameters:
      - description: Grade info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateGradeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.GradeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create grade
      tags:
      - grades
  /grades/{id}:
    delete:
      description: Delete a grade by ID; blocked if the grade is assigned to any class
      parameters:
      - description: Grade UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete grade
      tags:
      - grades
    get:
      description: Retrieve a grade by ID
      parameters:
      - description: Grade UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GradeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get grade
      tags:
      - grades
    put:
      consumes:
      - application/json
      description: Update a grade's name or sort order by ID
      parameters:
      - description: Grade UUID
        in: path
        name: id
        required: true
        type: string
      - description: Grade info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateGradeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GradeResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update grade
      tags:
      - grades
  /school:
    get:
      description: Retrieve the school record for this instance
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SchoolResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get school
      tags:
      - school
    post:
      consumes:
      - application/json
      description: Create the school record for this instance
      parameters:
      - description: School info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateSchoolRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.SchoolResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create school
      tags:
      - school
  /school/{id}:
    put:
      consumes:
      - application/json
      description: Update the school record by ID
      parameters:
      - description: School UUID
        in: path
        name: id
        required: true
        type: string
      - description: School info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateSchoolRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SchoolResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update school
      tags:
      - school
  /streams:
    get:
      description: Retrieve all streams ordered by name
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StreamResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List streams
      tags:
      - streams
    post:
      consumes:
      - application/json
      description: Create a new A/L stream (e.g. Science, Commerce, Arts)
      parameters:
      - description: Stream info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateStreamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.StreamResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create stream
      tags:
      - streams
  /streams/{id}:
    delete:
      description: Delete a stream by ID; blocked if the stream is assigned to any
        class
      parameters:
      - description: Stream UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete stream
      tags:
      - streams
    get:
      description: Retrieve a stream by ID
      parameters:
